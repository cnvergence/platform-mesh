version: "3"

vars:
  GOLANGCI_LINT_VERSION: v2.1.6
  ENVTEST_VERSION: release-0.23
  GO_TEST_COVERAGE_VERSION: v2.17.1

tasks:
  lint:
    desc: Run golangci-lint
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}} run --fix ./...

  test:
    desc: Run unit tests
    cmds:
      - go test -count=1 -short ./...

  cover:
    desc: Run tests with coverage
    cmds:
      - go test -count=1 -short -coverprofile=cover.out -covermode=atomic -coverpkg=./... ./...
      - go tool cover -func=cover.out

  fuzz:
    desc: "Run fuzz tests with a configurable duration (default 30s per target)"
    vars:
      FUZZTIME: '{{.FUZZTIME | default "30s"}}'
    cmds:
      - go test ./lifecycle/ -run=^$ -fuzz=FuzzRemoveMarkerFromStatus -fuzztime={{.FUZZTIME}} -count=1
      - go test ./conditions/ -run=^$ -fuzz=FuzzSetSubroutineCondition -fuzztime={{.FUZZTIME}} -count=1

  test-coverage:
    desc: Run tests with coverage and check thresholds
    deps:
      - task: cover
    cmds:
      - go install github.com/vladopajic/go-test-coverage/v2@{{.GO_TEST_COVERAGE_VERSION}}
      - go-test-coverage --profile cover.out --config ./.testcoverage.yml

  validate:
    desc: Run lint and tests
    cmds:
      - task: lint
      - task: test
