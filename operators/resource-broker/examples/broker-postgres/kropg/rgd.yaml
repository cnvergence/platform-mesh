apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: postgres.example.platform-mesh.io
spec:

  schema:
    group: example.platform-mesh.io
    apiVersion: v1alpha1
    kind: Postgres
    spec:
      tier: string
      version: string
      database: string
    status:
      status: ${deployment.status.conditions.exists(c, c.type == "Available" && c.status == "True") ? "Available":"Provisioning"}
      conditions: ${deployment.status.conditions}
      relatedResources:
        credentials:
          gvk:
            group: ${secret.apiVersion == "v1" ? "core":secret.apiVersion.split("/")[0]}
            version: ${secret.?apiVersion}
            kind: ${secret.?kind}
          name: ${secret.metadata.name}
          # See broker-certificates for why the origin namespace is
          # hardcoded via the syncagent annotation. Status expressions
          # cannot reference the schema, so the annotation is read from
          # the deployment, which copies it.
          namespace: ${deployment.metadata.?annotations["remote-object-namespace"]}

  resources:

    - id: deployment
      # kro only reconciles instances on spec changes; readyWhen makes it
      # requeue until the database is up so the instance status turns
      # Available once it is.
      readyWhen:
        - ${deployment.status.conditions.exists(c, c.type == "Available" && c.status == "True")}
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
          annotations:
            remote-object-name: ${schema.metadata.?annotations["syncagent.kcp.io/remote-object-name"]}
            remote-object-namespace: ${schema.metadata.?annotations["syncagent.kcp.io/remote-object-namespace"]}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app: ${schema.metadata.name}
            spec:
              containers:
                - name: postgres
                  image: postgres:${schema.spec.version}
                  env:
                    - name: POSTGRES_USER
                      value: app
                    - name: POSTGRES_PASSWORD
                      value: apppass
                    - name: POSTGRES_DB
                      value: ${schema.spec.database}
                  ports:
                    - containerPort: 5432
                  readinessProbe:
                    exec:
                      command: ["pg_isready", "-U", "app"]
                    initialDelaySeconds: 5
                    periodSeconds: 5

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          type: NodePort
          selector:
            app: ${schema.metadata.name}
          ports:
            - port: 5432
              targetPort: 5432

    - id: secret
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${schema.metadata.?annotations["syncagent.kcp.io/remote-object-name"]}
          namespace: ${schema.metadata.namespace}
        stringData:
          host: broker-kropg-control-plane
          port: ${string(service.spec.ports[0].nodePort)}
          username: app
          password: apppass
          dbname: ${schema.spec.database}
          uri: postgresql://app:apppass@broker-kropg-control-plane:${string(service.spec.ports[0].nodePort)}/${schema.spec.database}
