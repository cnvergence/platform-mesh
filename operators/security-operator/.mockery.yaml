all: false
force-file-write: true
formatter: goimports
include-auto-generated: true
log-level: info
recursive: false
require-template-schema-exists: true
template: testify
template-data:
  boilerplate-file: ../../hack/boilerplate/boilerplate.go.txt
packages:
  github.com/openfga/api/proto/openfga/v1:
    config:
      dir: internal/subroutine/mocks
      pkgname: mocks
    interfaces:
      OpenFGAServiceClient:
        config:
          filename: mock_OpenFGAServiceClient.go

  sigs.k8s.io/controller-runtime/pkg/client:
    config:
      dir: internal/subroutine/mocks
      pkgname: mocks
    interfaces:
      Client:
        config:
          filename: mock_Client.go

  sigs.k8s.io/controller-runtime/pkg/manager:
    config:
      dir: internal/subroutine/mocks
      pkgname: mocks
    interfaces:
      Manager:
        config:
          filename: mock_CTRLManager.go
          structname: MockCTRLManager

  sigs.k8s.io/multicluster-runtime/pkg/manager:
    config:
      dir: internal/subroutine/mocks
      pkgname: mocks
    interfaces:
      Manager:
        config:
          filename: mock_Manager.go
          structname: MockManager

  sigs.k8s.io/controller-runtime/pkg/cluster:
    config:
      dir: internal/subroutine/mocks
      pkgname: mocks
    interfaces:
      Cluster:
        config:
          filename: mock_Cluster.go

  k8s.io/client-go/discovery:
    config:
      dir: internal/subroutine/mocks
      pkgname: mocks
    interfaces:
      DiscoveryInterface:
        config:
          filename: mock_DiscoveryInterface.go

  go.platform-mesh.io/security-operator/internal/client:
    config:
      dir: internal/subroutine/mocks
      pkgname: mocks
    interfaces:
      KCPClientGetter:
        config:
          filename: mock_KCPClientGetter.go
      KCPCombinedClientGetter:
        config:
          filename: mock_KCPCombinedClientGetter.go
      Lister:
        config:
          filename: mock_Lister.go

  go.platform-mesh.io/security-operator/internal/fga:
    config:
      dir: internal/subroutine/mocks
      pkgname: mocks
    interfaces:
      StoreIDGetter:
        config:
          filename: mock_StoreIDGetter.go

  go.platform-mesh.io/security-operator/pkg/clientreg:
    config:
      dir: internal/subroutine/mocks
      pkgname: mocks
    interfaces:
      TokenRefresher:
        config:
          filename: mock_TokenRefresher.go
