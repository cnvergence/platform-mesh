version: '3'

includes:
  # Shared go-installable tooling (controller-gen, golangci-lint, mockery,
  # apigen), installed once into the root bin/ and reused by every component.
  tools:
    taskfile: ../../tools/Taskfile.yaml
    dir: .

vars:
  CRD_DIRECTORY: config/crd

tasks:
  manifests:
    cmds:
      - task: tools:generate-crds
        vars:
          PATH: /sharding/...
          OUTPUT: '{{.CRD_DIRECTORY}}'
  generate:
    cmds:
      - task: manifests
      - task: tools:generate-deepcopy
        vars:
          PATH: /sharding/...
  fmt:
    cmds:
      - go fmt ./...
  lint:
    cmds:
      - task: fmt
      - task: tools:lint
  test:
    deps: [tools:envtest]
    cmds:
      - |
        set -ex
        export KUBEBUILDER_ASSETS=$({{.BIN}}/setup-envtest use {{.ENVTEST_K8S_VERSION}} --bin-dir {{.BIN}} -p path)
        go test ./... {{.ADDITIONAL_COMMAND_ARGS}}
  test-e2e: # alias to appease the global taskfile
    cmds:
      - task: test
  cover:
    cmds:
      - task: test
        vars:
          ADDITIONAL_COMMAND_ARGS: -v -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
  build:
    cmds:
      - go build ./...
  docker-build:
    vars:
      IMAGE_TAG: '{{.IMAGE_TAG | default "dev"}}'
    cmds:
      - docker build -t ghcr.io/platform-mesh/resource-sharding-operator:{{.IMAGE_TAG}} .
  docker:kind:
    desc: "Build container image and load into Kind cluster"
    vars:
      KIND_CLUSTER: '{{.KIND_CLUSTER | default "platform-mesh"}}'
      DEPLOYMENT_NAME: '{{.DEPLOYMENT_NAME | default "resource-sharding-operator"}}'
      DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE | default "platform-mesh-system"}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "dev"}}'
    cmds:
      - docker build -t ghcr.io/platform-mesh/resource-sharding-operator:{{.IMAGE_TAG}} .
      - kind load docker-image ghcr.io/platform-mesh/resource-sharding-operator:{{.IMAGE_TAG}} --name {{.KIND_CLUSTER}}
      - kubectl rollout restart deployment/{{.DEPLOYMENT_NAME}} -n {{.DEPLOYMENT_NAMESPACE}}
  validate:
    cmds:
      - task: lint
      - task: test
